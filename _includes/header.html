<header class="site-header">
    <div class="container">
        <div class="header-inner">
            <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title }}</a>
            <div class="header-actions" style="display: flex; align-items: center; gap: 0.25rem;">
                <button class="search-toggle" aria-label="Search" id="search-toggle" onclick="toggleSearch()" style="background: none; border: none; cursor: pointer; color: var(--text-main); display: flex; align-items: center; padding: 0.5rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="menu-toggle" aria-label="Toggle menu" id="menu-toggle">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
            </div>
            <nav class="site-nav" id="site-nav">
                <ul class="nav-list">
                    <li><a href="{{ '/' | relative_url }}" class="page-link">Home</a></li>
                    <li><a href="{{ '/archive' | relative_url }}" class="page-link">Archive</a></li>
                    <li class="nav-has-children">
                        <span class="page-link">Topics</span>
                        <ul class="sub-menu">
                            <li><a href="{{ '/category/tech' | relative_url }}">Tech</a></li>
                            <li><a href="{{ '/category/news' | relative_url }}">News</a></li>
                            <li><a href="{{ '/category/geopolitics' | relative_url }}">Geopolitics</a></li>
                        </ul>
                    </li>
                    <li><a href="{{ '/about' | relative_url }}" class="page-link">About</a></li>
                    <li><a href="{{ '/contact' | relative_url }}" class="page-link">Contact</a></li>
                    <li class="nav-auth-item">
                        <a href="{{ '/login' | relative_url }}" class="page-link auth-link logged-out-show">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </a>
                        <a href="{{ '/profile' | relative_url }}" class="page-link auth-link logged-in-show" style="display: none;">
                            <img id="fb-user-avatar" src="" alt="Profile" class="nav-avatar">
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    
    <div class="search-overlay" id="search-overlay">
        <div class="container">
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search posts..." aria-label="Search posts">
                <button class="close-search" onclick="toggleSearch()" aria-label="Close search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <ul id="search-results" class="search-results"></ul>
        </div>
    </div>
</header>
