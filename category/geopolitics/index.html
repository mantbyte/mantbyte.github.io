---
layout: default
title: Geopolitics
---

<div class="archive-container">
    <header class="page-header">
        <h1 class="page-title">Geopolitics</h1>
        <p class="page-subtitle">The geopolitics of the tech world.</p>
    </header>

    <div class="archive-list">
        {% for post in site.categories.Geopolitics %}
            <article class="archive-item">
                <time datetime="{{ post.date | date_to_xmlschema }}" class="archive-date">{{ post.date | date: "%b %d, %Y" }}</time>
                <div class="archive-details">
                    <h3 class="archive-title"><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
                </div>
            </article>
        {% endfor %}
    </div>
</div>
