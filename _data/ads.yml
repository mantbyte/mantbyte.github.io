# =============================================================================
# AD MANAGEMENT SYSTEM for mantbytes
# =============================================================================
# This file controls ALL advertisements on your site.
# To add/remove/update an ad, just edit this file — no code changes needed.
#
# HOW IT WORKS:
#   1. Upload your ad image to: assets/images/ads/
#   2. Add an entry below with the correct "location" 
#   3. Push to GitHub — done!
#
# LOCATIONS (where the ad appears):
#   - home-page      → Homepage, below the hero section
#   - archive-page   → Archive page, below the title
#   - in-article     → Inside blog posts, below the title
#   - bottom-article  → Inside blog posts, at the bottom
#
# To DISABLE an ad slot, set active: false
# To show NO ads at all, make this file empty (just a comment)
# =============================================================================

