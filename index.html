---
layout: default
title: Home
---

<div class="home-container">
    <section class="hero">
        <h1 class="hero-title">Mantbyte</h1>
        <p class="hero-subtitle">Engineering insights, practical tutorials, and technical deep dives.</p>
    </section>

    <!-- AD SLOT: home-page -->
    {% include ad_slot.html location="home-page" %}

    <section class="latest-posts">
        <h2 class="section-title">Latest Writing</h2>

        <div class="category-filters" id="categoryFilters">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="tech">Tech</button>
            <button class="filter-btn" data-category="geopolitics">Geopolitics</button>
            <button class="filter-btn" data-category="news">News</button>
        </div>

        <div class="post-list" id="postList">
            {% for post in site.posts limit:10 %}
                <div class="post-list-item" data-category="{{ post.categories | first | downcase }}">
                    {% include post_card.html post=post %}
                </div>
            {% endfor %}
        </div>
        
        <div class="view-all">
            <a href="{{ '/archive' | relative_url }}" class="btn">View all posts</a>
        </div>
    </section>
</div>

<script>
(function() {
    const filters = document.getElementById('categoryFilters');
    const posts = document.querySelectorAll('.post-list-item');
    
    filters.addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        
        // Update active button
        filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const cat = btn.dataset.category;
        
        posts.forEach(function(post) {
            if (cat === 'all' || post.dataset.category === cat) {
                post.style.display = '';
            } else {
                post.style.display = 'none';
            }
        });
    });
})();
</script>
