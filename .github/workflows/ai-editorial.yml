# Mantbyte AI Editorial Pipeline
# Runs every 3 hours to generate high-quality tech articles.
# Creates a Pull Request for human review before publishing.

name: AI Editorial Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours
  workflow_dispatch:          # Manual trigger for testing

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '_automation/requirements.txt'

      - name: Install dependencies
        run: pip install -r _automation/requirements.txt

      - name: Run AI Editorial Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          python _automation/pipeline.py
        continue-on-error: false

      - name: Read PR body
        id: pr_body
        if: success()
        run: |
          if [ -f _automation/pr_body.md ]; then
            echo "has_pr_body=true" >> $GITHUB_OUTPUT
          else
            echo "has_pr_body=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: success() && steps.pr_body.outputs.has_pr_body == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ai/article-${{ github.run_id }}
          commit-message: "[AI] New article generated by editorial pipeline"
          title: "[AI] New Article Ready for Review"
          body-path: _automation/pr_body.md
          labels: ai-generated
          delete-branch: true
          add-paths: |
            _posts/*
            assets/images/posts/*
            _data/knowledge.json
