# Mantbyte AI Editorial Pipeline
# Runs every 3 hours to generate high-quality tech articles.
# Creates a Pull Request for human review before publishing.

name: AI Editorial Pipeline

on:
  schedule:
    - cron: '0 */3 * * *'   # Every 3 hours
  workflow_dispatch:          # Manual trigger for testing

# Concurrency Protection: Ensure only one pipeline runs at a time
concurrency:
  group: editorial-pipeline
  cancel-in-progress: false

env:
  DRY_RUN: "false" # Set to "true" to test without making PRs or modifying the repo

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '_automation/requirements.txt'

      - name: Install dependencies
        run: pip install -r _automation/requirements.txt

      - name: Run AI Editorial Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd ${{ github.workspace }}
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running in DRY RUN mode..."
            python _automation/pipeline.py --dry-run
          else
            python _automation/pipeline.py
          fi
        continue-on-error: false

      - name: Upload Dry Run Artifacts
        if: success() && env.DRY_RUN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ai-editorial-dry-run
          path: _dry_run_artifacts/
          retention-days: 5

      - name: Read PR body
        id: pr_body
        if: success()
        run: |
          if [ -f _automation/pr_body.md ]; then
            echo "has_pr_body=true" >> $GITHUB_OUTPUT
          else
            echo "has_pr_body=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: success() && steps.pr_body.outputs.has_pr_body == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git author
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Create a unique branch for this run and attempt
          BRANCH_NAME="ai/article-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b $BRANCH_NAME
          
          # Stage the generated files
          git add _posts/ assets/images/posts/ _data/knowledge.json
          
          # Check if there are actual changes
          if git diff --staged --quiet; then
            echo "No new files generated. Skipping PR creation."
            exit 0
          fi
          
          # Commit and push
          git commit -m "[AI] New article generated by editorial pipeline"
          git push -u origin $BRANCH_NAME
          
          # Create the Pull Request using native GitHub CLI
          echo "Creating pull request..."
          gh pr create \
            --title "[AI] New Article Ready for Review" \
            --body-file _automation/pr_body.md \
            --label "ai-generated" \
            --base main
          
          echo "✅ Pull request created successfully!"
